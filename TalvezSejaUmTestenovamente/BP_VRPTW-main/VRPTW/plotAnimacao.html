<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Visualização de Rotas - VRPTW</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/bbecquet/Leaflet.PolylineDecorator@master/dist/leaflet.polylineDecorator.min.js"></script>

  <style>
    #map {
      height: 90vh;
      width: 100%;
    }

    .animated-vehicle {
      width: 32px;
      height: 32px;
      background-image: url('navio.PNG'); /* substitua pelo nome correto */
      background-size: contain;
      background-repeat: no-repeat;
    }

    #clock {
      position: absolute;
      top: 10px;
      right: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 16px;
      z-index: 1000;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <h2>Visualização de Rotas - VRPTW</h2>
  <div id="clock">Tempo: 0.00</div>
  <div id="map"></div>

  <script>
    const map = L.map('map').setView([0, 0], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    fetch('solucao_ex.json')
      .then(response => response.json())
      .then(data => {
        const nos = {};
        const bounds = [];

        data.nos.forEach(no => {
          const coord = [no.y, no.x];
          nos[no.id] = coord;
          bounds.push(coord);

          L.circleMarker(coord, {
            radius: 5,
            color: 'black',
            fillColor: 'white',
            fillOpacity: 1
          }).addTo(map).bindTooltip(`Nó ${no.id}`, {
            permanent: true,
            direction: 'top'
          });
        });

        const cores = ['red', 'blue', 'green', 'orange', 'purple', 'brown'];

        data.veiculos.forEach((veic, idx) => {
          const cor = cores[idx % cores.length];
          const rotaCoords = veic.rota.map(id => nos[id]).filter(c => c);

          if (rotaCoords.length < 2) return;

          const linha = L.polyline(rotaCoords, {
            color: cor,
            weight: 4,
            opacity: 0.7
          }).addTo(map);

          L.polylineDecorator(L.polyline(rotaCoords), {
            patterns: [
              {
                offset: '25%',
                repeat: '220px',
                symbol: L.Symbol.arrowHead({
                  pixelSize: 10,
                  polygon: false,
                  pathOptions: { stroke: true, color: cor }
                })
              }
            ]
          }).addTo(map);

          linha.bindPopup(`🚚 Veículo ${veic.id}<br>🧾 Custo: ${veic.custo.toFixed(2)}`);

          veic.rota.forEach((id, i) => {
            const chegada = veic.chegadas?.[i] ?? 'N/A';
            const coord = nos[id];
            if (coord) {
              L.circleMarker(coord, {
                radius: 6,
                color: cor,
                fillColor: cor,
                fillOpacity: 0.5
              }).addTo(map)
                .bindTooltip(`Nó ${id}<br>🕒 Chegada: ${chegada.toFixed(2)}`, {
                  permanent: false,
                  direction: 'right'
                })
                .bindPopup(`🕒 Atendimento no nó ${id}: ${chegada.toFixed(2)}`);
            }
          });

          // ✅ Animação do navio + relógio sincronizado
          const marker = L.marker(rotaCoords[0], {
            icon: L.divIcon({
              className: 'animated-vehicle',
              iconSize: [32, 32],
              iconAnchor: [16, 16]
            })
          }).addTo(map);

          const chegadas = veic.chegadas;
          let i = 0;
          let tempoAtual = chegadas[0] ?? 0;
          const clock = document.getElementById('clock');

          function mover() {
            if (i < rotaCoords.length) {
              marker.setLatLng(rotaCoords[i]);
              tempoAtual = chegadas[i] ?? tempoAtual;
              clock.innerText = `Tempo: ${tempoAtual.toFixed(2)}`;
              i++;
              setTimeout(mover, 1000); // 1 segundo por ponto
            }
          }

          mover();
        });

        if (bounds.length > 0) {
          map.fitBounds(bounds, { padding: [30, 30] });
        }
      })
      .catch(err => {
        console.error("Erro ao carregar JSON:", err);
      });
  </script>
</body>
</html>
